<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone Decoder</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --border-color: #dee2e6;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --info-color: #17a2b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .container {
            text-align: center;
            padding: 1rem 2rem 2rem 2rem;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }
        h1 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        .controls {
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .settings {
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: left;
        }
        .settings > div {
            display: flex;
            flex-direction: column;
        }
        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            transition: background-color 0.3s;
        }
        #startButton { background-color: var(--success-color); }
        #stopButton { background-color: var(--danger-color); }
        #copyButton { background-color: var(--info-color); }
        button:disabled {
            background-color: var(--secondary-color);
            cursor: not-allowed;
        }
        #visualizer {
            width: 100%;
            height: 80px;
            background-color: #000;
            border-radius: 5px;
            margin-bottom: 1rem;
        }
        #currentNoteOutput {
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            min-height: 60px;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
        }
        #historyOutput {
            width: 100%;
            height: 120px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-top: 1px dashed var(--border-color);
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
            font-size: 1.2rem;
            color: var(--text-color);
            background-color: #f8f9fa;
            resize: vertical;
            box-sizing: border-box;
        }
        .settings label {
            margin-bottom: 0.25rem;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .settings input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tone Decoder</h1>
    <div class="controls">
        <button id="startButton">Start</button>
        <button id="stopButton" disabled>Stop</button>
        <button id="copyButton" disabled>Copy</button>
    </div>
    <div class="settings">
        <div>
            <label for="clarity">Clarity (FFT: <span id="clarityValue">4096</span>)</label>
            <input type="range" id="clarity" min="8" max="14" value="12" step="1">
        </div>
        <div>
            <label for="durationThreshold">Duration (<span id="durationThresholdValue">100</span> ms)</label>
            <input type="range" id="durationThreshold" min="50" max="500" value="100" step="10">
        </div>
    </div>
    <canvas id="visualizer"></canvas>
    <div id="currentNoteOutput">--</div>
    <textarea id="historyOutput" readonly placeholder="Detected note history will appear here..."></textarea>
</div>

<script type="module">
    import { PitchDetector } from "https://esm.sh/pitchy@4";

    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');
    const copyButton = document.getElementById('copyButton');
    const currentNoteOutput = document.getElementById('currentNoteOutput');
    const historyOutput = document.getElementById('historyOutput');
    
    const claritySlider = document.getElementById('clarity');
    const clarityValueSpan = document.getElementById('clarityValue');
    const durationThresholdSlider = document.getElementById('durationThreshold');
    const durationThresholdValueSpan = document.getElementById('durationThresholdValue');

    const visualizerCanvas = document.getElementById('visualizer');
    const canvasCtx = visualizerCanvas.getContext('2d');

    let audioContext, analyserNode, mediaStream, animationFrameId;
    let frequencyDataArray;

    // State for duration filter
    let lastDetectedNote = null;
    let noteStartTime = 0;
    let isNoteStable = false;

    const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    // --- Event Listeners ---
    claritySlider.addEventListener('input', () => {
        const fftSize = Math.pow(2, parseInt(claritySlider.value, 10));
        clarityValueSpan.textContent = fftSize;
    });

    durationThresholdSlider.addEventListener('input', () => {
        durationThresholdValueSpan.textContent = durationThresholdSlider.value;
    });

    startButton.addEventListener('click', start);
    stopButton.addEventListener('click', stop);
    copyButton.addEventListener('click', copyHistory);

    // --- Core Functions ---
    function frequencyToNoteName(frequency) {
        if (!frequency) return null;
        const midiNum = 12 * (Math.log2(frequency / 440)) + 69;
        const noteIndex = Math.round(midiNum) % 12;
        const octave = Math.floor(Math.round(midiNum) / 12) - 1;
        return noteNames[noteIndex] + octave;
    }

    function update(detector, input, sampleRate) {
        analyserNode.getFloatTimeDomainData(input);
        const [pitch, clarity] = detector.findPitch(input, sampleRate);
        
        const currentNote = clarity > 0.95 ? frequencyToNoteName(pitch) : null;
        currentNoteOutput.textContent = currentNote || '--';

        // Duration filter logic
        const durationThreshold = parseInt(durationThresholdSlider.value, 10);
        const now = performance.now();

        if (currentNote && currentNote === lastDetectedNote) {
            const duration = now - noteStartTime;
            if (duration >= durationThreshold && !isNoteStable) {
                historyOutput.value += `${currentNote} `;
                historyOutput.scrollTop = historyOutput.scrollHeight; // Auto-scroll
                isNoteStable = true;
                copyButton.disabled = false;
            }
        } else {
            lastDetectedNote = currentNote;
            noteStartTime = now;
            isNoteStable = false;
        }

        drawVisualizer();
        animationFrameId = requestAnimationFrame(() => update(detector, input, sampleRate));
    }

    async function start() {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            const source = audioContext.createMediaStreamSource(mediaStream);
            const fftSize = Math.pow(2, parseInt(claritySlider.value, 10));
            analyserNode = new AnalyserNode(audioContext, { fftSize: fftSize });
            source.connect(analyserNode);

            frequencyDataArray = new Uint8Array(analyserNode.frequencyBinCount);
            const detector = PitchDetector.forFloat32Array(analyserNode.fftSize);
            const input = new Float32Array(detector.inputLength);

            // Reset state
            historyOutput.value = "";
            lastDetectedNote = null;
            noteStartTime = performance.now();
            isNoteStable = false;

            update(detector, input, audioContext.sampleRate);

            setUIState(true);
        } catch (err) {
            console.error("Error accessing microphone:", err);
            alert("マイクへのアクセスに失敗しました。ブラウザの設定を確認してください。 " + err.message);
        }
    }

    function stop() {
        if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        if (audioContext) audioContext.close();
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        
        clearVisuals();
        setUIState(false);
    }

    function copyHistory() {
        if (!historyOutput.value) return;
        navigator.clipboard.writeText(historyOutput.value.trim()).then(() => {
            const originalText = copyButton.textContent;
            copyButton.textContent = 'Copied!';
            setTimeout(() => { copyButton.textContent = originalText; }, 1500);
        }).catch(err => {
            console.error('Failed to copy text: ', err);
        });
    }

    // --- UI & Drawing Functions ---
    function setUIState(isRecording) {
        startButton.disabled = isRecording;
        stopButton.disabled = !isRecording;
        copyButton.disabled = isRecording || !historyOutput.value;
        claritySlider.disabled = isRecording;
        durationThresholdSlider.disabled = isRecording;
    }

    function clearVisuals() {
        canvasCtx.fillStyle = '#000';
        canvasCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        currentNoteOutput.textContent = '--';
    }

    function drawVisualizer() {
        analyserNode.getByteFrequencyData(frequencyDataArray);
        canvasCtx.fillStyle = '#000';
        canvasCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);

        const barWidth = (visualizerCanvas.width / analyserNode.frequencyBinCount) * 2.5;
        let x = 0;
        for (let i = 0; i < analyserNode.frequencyBinCount; i++) {
            const barHeight = frequencyDataArray[i];
            const percent = barHeight / 255;
            const hue = percent * 120 + 240;
            canvasCtx.fillStyle = 'hsl(' + hue + ', 100%, 50%)';
            canvasCtx.fillRect(x, visualizerCanvas.height - barHeight / 2, barWidth, barHeight / 2);
            x += barWidth + 1;
        }
    }

    // --- Initial Setup ---
    function initialize() {
        clarityValueSpan.textContent = Math.pow(2, parseInt(claritySlider.value, 10));
        durationThresholdValueSpan.textContent = durationThresholdSlider.value;
        clearVisuals();
        setUIState(false);
    }

    initialize();

</script>
</body>
</html>
